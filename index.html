<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindGraph AI</title>
    <script>
      (() => {
        try {
          const root = document.documentElement;
          const themePreferenceRaw = window.localStorage.getItem("mindgraph.ui.theme");
          const toolbarDisplayRaw = window.localStorage.getItem("mindgraph.ui.toolbar.display");
          const themePreference =
            themePreferenceRaw === "dark" || themePreferenceRaw === "light" || themePreferenceRaw === "system"
              ? themePreferenceRaw
              : "system";
          const theme =
            themePreference === "dark" || themePreference === "light"
              ? themePreference
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          const toolbarDisplay =
            toolbarDisplayRaw === "icons+text" || toolbarDisplayRaw === "text" ? toolbarDisplayRaw : "icons";
          root.dataset.themePreference = themePreference;
          root.dataset.theme = theme;
          root.dataset.toolbarDisplay = toolbarDisplay;
        } catch {
          // noop
        }
      })();
    </script>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='1' y1='0' y2='1'%3E%3Cstop offset='0' stop-color='%231e4d86'/%3E%3Cstop offset='1' stop-color='%234277bc'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x='4' y='4' width='56' height='56' rx='14' fill='url(%23g)'/%3E%3Ctext x='32' y='39' text-anchor='middle' font-family='Arial,sans-serif' font-size='22' font-weight='700' fill='white'%3EMG%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="./css/app.css" />
    <link rel="stylesheet" href="./css/layout.css" />
    <link rel="stylesheet" href="./css/nodes.css" />
    <link rel="stylesheet" href="./css/panels.css" />
  </head>
  <body>
    <div id="mg-protocol-warning" style="display: none; margin: 1rem; padding: 0.8rem 1rem; border: 1px solid #e3b8b8; border-radius: 8px; background: #fff6f6; color: #6d1f1f; font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif;">
      MindGraph AI must be opened over HTTP, not <code>file://</code>. Run
      <code>python3 -m http.server 4173</code> in this folder and open
      <code>http://127.0.0.1:4173</code>.
    </div>
    <app-shell></app-shell>
    <script>
      if (location.protocol === "file:") {
        document.getElementById("mg-protocol-warning").style.display = "block";
      }
    </script>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
