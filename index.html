<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CAR Brain</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect x='4' y='4' width='56' height='56' rx='8' fill='%23080c14'/%3E%3Ccircle cx='32' cy='32' r='12' fill='none' stroke='%2300f5ff' stroke-width='2'/%3E%3Ccircle cx='32' cy='32' r='4' fill='%2300f5ff'/%3E%3Cline x1='20' y1='20' x2='44' y2='44' stroke='%237b61ff' stroke-width='1.5'/%3E%3Cline x1='44' y1='20' x2='20' y2='44' stroke='%23ff2d78' stroke-width='1.5'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="./css/app.css" />
    <link rel="stylesheet" href="./css/layout.css" />
    <link rel="stylesheet" href="./css/nodes.css" />
    <link rel="stylesheet" href="./css/panels.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div
      id="mg-protocol-warning"
      style="
        display: none;
        margin: 1rem;
        padding: 0.8rem 1rem;
        border: 1px solid #21262d;
        border-radius: 4px;
        background: #0d1117;
        color: #c9d1d9;
        font-family: 'IBM Plex Sans', sans-serif;
      "
    >
      CAR Brain must be opened over HTTP, not <code>file://</code>. Run
      <code>node server.js</code> in this folder and open
      <code>http://localhost:4173</code>.
    </div>
    <app-shell></app-shell>
    <script>
      if (location.protocol === "file:") {
        document.getElementById("mg-protocol-warning").style.display = "block";
      }
    </script>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
